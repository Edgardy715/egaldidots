# ═══════════════════════════════════════════════════════════════════════
# kitty.conf · punto de entrada
# ═══════════════════════════════════════════════════════════════════════
# Toda la configuración real vive en user.conf, incluido al FINAL → es
# autoritativa (pisa los defaults de kitty). user.conf incluye a su vez
# los colores de pywal:
#     include ~/.cache/wal/colors-kitty.conf
# Se descarta el kitty.conf de fábrica de 3000+ líneas de comentarios: es
# ruido sin valor de configuración. Mantener sólo el include reproduce
# el setup real y lo deja portable (sin paths absolutos hardcodeados).
include ~/.config/kitty/user.conf
