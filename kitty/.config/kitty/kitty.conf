# ═══════════════════════════════════════════════════════════════════════
# kitty.conf · punto de entrada
# ═══════════════════════════════════════════════════════════════════════
# All real configuration lives in user.conf, which is included LAST → it's
# authoritative (overrides kitty defaults). user.conf in turn includes the
# pywal colors:
#     include ~/.cache/wal/colors-kitty.conf
# The factory kitty.conf with 3000+ lines of comments is discarded: it's
# noise with no config value. Keeping only the include reproduces the real
# setup and keeps it portable (no hardcoded absolute paths).
include ~/.config/kitty/user.conf
