#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
#
exec-once = ~/.config/waybar/scripts/launch.sh
# Boot wallpaper: uses the current-wallpaper symlink (kept by wallpaper-picker.sh)
# → single source of truth: the displayed wallpaper is the same one whose colors wal -R applies.
exec-once = bash -c "killall -q awww-daemon; awww-daemon & sleep 1 && WP=$(readlink -f ~/.cache/wal/current-wallpaper); [ -f \"$WP\" ] && awww img \"$WP\" --transition-type wipe --transition-fps 144"
exec-once = bash -c "sleep 2 && wal -R"

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

exec-once = wl-clip-persist --clipboard regular
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle

exec-once = sleep 4 && hyprctl dispatch dpms on DP-1
