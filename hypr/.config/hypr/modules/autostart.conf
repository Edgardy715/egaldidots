#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
#
exec-once = ~/.config/waybar/scripts/launch.sh
# Wallpaper del boot: usa el symlink current-wallpaper (lo mantiene wallpaper-picker.sh)
# → ÚNICA fuente de verdad: el wallpaper que se muestra es el mismo cuyos colores aplica wal -R.
# (Antes estaba hardcodeado a ~/Descargas/wallhaven-luffy.png, archivo que ya no existe → boot sin fondo.)
exec-once = bash -c "killall -q awww-daemon; awww-daemon & sleep 1 && WP=$(readlink -f ~/.cache/wal/current-wallpaper); [ -f \"$WP\" ] && awww img \"$WP\" --transition-type wipe --transition-fps 144"
exec-once = bash -c "sleep 2 && wal -R"

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

exec-once = wl-clip-persist --clipboard regular
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle

exec-once = sleep 4 && hyprctl dispatch dpms on DP-1
