animations {
    enabled = yes

    # ── High-impact curves ──
    # In: a generous bounce that settles into place.
    bezier = bounceIn, 0.15, 1.15, 0.35, 1.1
    # Out: slingshot — stretches forward before sucking back in.
    bezier = slingShot, 0.45, -0.45, 0.15, 1.25
    # Move: smooth, no bounce (avoids nausea on constant reflow).
    bezier = softFluid, 0.2, 1, 0.2, 1

    # ── Windows ──
    # Pop in from 40% with bounceIn.
    animation = windowsIn, 1, 4.5, bounceIn, popin 40%
    # Slingshot back to 60% before disappearing.
    animation = windowsOut, 1, 3.5, slingShot, popin 60%
    # Smooth tile-to-tile movement.
    animation = windowsMove, 1, 4.5, softFluid

    # ── Layers (SwayNC, Waybar, Rofi) ──
    # Slide in with a bounce for the glass control center.
    animation = layersIn, 1, 4, bounceIn, slide
    # Slingshot out to feel light.
    animation = layersOut, 1, 3, slingShot, slide

    # ── Fades ──
    animation = fadeIn, 1, 3, softFluid
    animation = fadeOut, 1, 3, softFluid
    animation = fadeShadow, 1, 3, softFluid

    # ── Workspaces ──
    # Quick, elegant slide.
    animation = workspaces, 1, 4.5, softFluid, slide
    # Special workspace (e.g. your miniPlayer).
    animation = specialWorkspace, 1, 4.5, bounceIn, slidevert
}
