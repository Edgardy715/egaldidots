animations {
    enabled = yes

    # ── Curvas de Alto Impacto ──
    # Entrada: Un rebote generoso y jugoso que se clava en su sitio.
    bezier = bounceIn, 0.15, 1.15, 0.35, 1.1
    # Salida: Efecto "honda". Se estira un poco hacia adelante antes de succionarse.
    bezier = slingShot, 0.45, -0.45, 0.15, 1.25
    # Movimiento: Fluidez absoluta para el tiling y workspaces.
    bezier = softFluid, 0.2, 1, 0.2, 1

    # ── Ventanas ──
    # Explota desde el 40% del tamaño con el bounceIn.
    animation = windowsIn, 1, 4.5, bounceIn, popin 40%
    # Se succiona con el efecto honda hacia el 60% antes de desaparecer.
    animation = windowsOut, 1, 3.5, slingShot, popin 60%
    # El movimiento entre tiles: suave y fluido, sin el rebote que maree al reflow constante.
    animation = windowsMove, 1, 4.5, softFluid

    # ── Capas (SwayNC, Waybar, Rofi) ──
    # Entrada lateral con rebote para tu centro de control de cristal.
    animation = layersIn, 1, 4, bounceIn, slide
    # Salida con el tirón de la honda para que se sienta ligero.
    animation = layersOut, 1, 3, slingShot, slide
    
    # ── Desvanecimientos (Fades) ──
    animation = fadeIn, 1, 3, softFluid
    animation = fadeOut, 1, 3, softFluid
    animation = fadeShadow, 1, 3, softFluid

    # ── Workspaces ──
    # Un deslizamiento rápido pero elegante, como pasar páginas de un libro premium.
    animation = workspaces, 1, 4.5, softFluid, slide
    # Para el "special workspace" (donde podrías tener tu miniPlayer).
    animation = specialWorkspace, 1, 4.5, bounceIn, slidevert
}
