##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.70, match:namespace waybar

# Glass effect for the Control Center (SwayNC)
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.25, match:namespace swaync-control-center

# Glass effect for floating notifications
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.25, match:namespace swaync-notification-window

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.25, match:namespace rofi

# Vesktop
windowrule {
    name = vesktop-opacity
    match:class = ^(vesktop)$
    opacity = 0.90 0.85
}

# Glass effect for Thunar (the blur from decorations.conf shows through)
# Object-form (modern). flat windowrulev2 is deprecated in 0.55.x.
windowrule {
    name = thunar-glass
    match:class = ^(thunar)$
    opacity = 0.88 0.82
}

