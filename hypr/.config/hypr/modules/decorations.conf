#####################
### LOOK AND FEEL ###
#####################
# Source the pywal theme
source = ~/.cache/wal/colors-hyprland.conf

general {
    gaps_in = 7.5
    gaps_out = 15
    border_size = 1
    col.active_border = $color4 $color2 45deg
    col.inactive_border = $color8
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 4
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}
