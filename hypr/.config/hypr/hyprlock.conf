# ═══════════════════════════════════════════════════════════════════════
# hyprlock · Dynamic-Island glass · paleta del wallpaper (pywal)
# ═══════════════════════════════════════════════════════════════════════
# Paleta glass derivada del wallpaper actual — se regenera sola en cada
# `wal -i` / wallpaper-picker (mismo pipeline que waybar y rofi), vía
# ~/.config/hypr/scripts/generate-rofi-theme.py.
# Fallbacks primero por si el archivo aún no existiera (nunque nunca).
$bg           = rgba(30, 30, 46, 1.00)
$fg           = rgba(205, 214, 244, 1.00)
$muted        = rgba(205, 214, 244, 0.55)
$faint        = rgba(205, 214, 244, 0.32)
$accent       = rgba(203, 186, 188, 1.00)
$accent_soft   = rgba(203, 186, 188, 0.60)
$accent_glow  = rgba(203, 186, 188, 0.28)
$hair         = rgba(205, 214, 244, 0.10)
$glass        = rgba(30, 30, 46, 0.42)
$glass_strong = rgba(30, 30, 46, 0.62)

source = ~/.cache/wal/colors-hyprlock.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    grace = 2
    disable_loading_bar = true
}

# ── FONDO ── el wallpaper actual del tema, difuminado + matizado
background {
    monitor =
    path = ~/.cache/wal/current-wallpaper
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.93
    brightness = 0.55
    vibrancy = 0.35
    vibrancy_darkness = 0.0
    color = $bg
}

# ── RELOJ ── el héroe, tipográfico, sin caja
label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(0, 0, 0, 0.45)
}

# ── FECHA ── ⌄ calendario localizado
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d de %B" | sed 's/^./\U&/')"
    color = $muted
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 52
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.35)
}

# ── CAMPO DE CONTRASEÑA ── píldora de cristal (isla principal)
input-field {
    monitor =
    size = 300, 52
    outline_thickness = 1
    dots_size = 0.26
    dots_spacing = 0.30
    dots_center = true
    font_family = JetBrainsMono Nerd Font
    outer_color = $hair
    inner_color = $glass
    font_color = $fg
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i><span foreground="#ffffff66">  Contraseña...</span></i>
    hide_input = false
    rounding = -1
    check_color = $accent_soft
    fail_color = rgba(220, 80, 80, 0.45)
    fail_text = <i><span foreground="#ffffff80">$FAIL</span></i>
    fail_transition = 300
    capslock_color = rgba(220, 170, 60, 0.45)
    position = 0, -28
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 15
    shadow_color = rgba(0, 0, 0, 0.3)
}

# ───────────────────────────────────────────────────────────────────────
# NOW PLAYING · línea tipográfica flotante (sin caja → minimalista)
#   󰈹  Artista — Título      sólo mientras se reproduce (hide-on-pause,
#   igual que el módulo mpris de waybar); al pausar/parar la línea desaparece.
# Sin shape: hyprlock NO recorta el texto al shape, así que una píldora se
# desbordaba con títulos largos.  Texto PLANO (hyprlock escapa la salida de
# `cmd` → el markup Pango saldría literal); el color lo da $accent, que vive
# con el wallpaper (mismo acento que el resto del sistema).  Trunca a 40 en
# lock-mpris.py → nunca más ancho que la pantalla.
# ───────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/lock-mpris.py line
    color = $accent
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 7
    shadow_color = rgba(0, 0, 0, 0.4)
}

# ───────────────────────────────────────────────────────────────────────
# INFORMACIÓN ADICIONAL · flotante, tenue
# ───────────────────────────────────────────────────────────────────────

# USUARIO — esquina superior derecha
label {
    monitor =
    text =   $USER
    color = $muted
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = -30, -30
    halign = right
    valign = top
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.4)
}

# UPTIME — esquina superior derecha
label {
    monitor =
    text = cmd[update:60000] echo "󰔚  $(uptime -p | sed 's/up //; s/ hours/h/g; s/ hour/h/g; s/ minutes/m/g; s/ minute/m/g; s/ days/d/g; s/ day/d/g; s/,//g')"
    color = $muted
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = -30, -54
    halign = right
    valign = top
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.4)
}

# BATERÍA — isla inferior de cristal
shape {
    monitor =
    size = 96, 34
    color = $glass
    rounding = -1
    border_size = 1
    border_color = $hair
    position = 0, 34
    halign = center
    valign = bottom
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.3)
}

# BATERÍA — texto
label {
    monitor =
    text = cmd[update:15000] echo "$(if [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "1" ]; then echo "󰂄"; else echo "󰁹"; fi)  $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null)%"
    color = $fg
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 43
    halign = center
    valign = bottom
}
